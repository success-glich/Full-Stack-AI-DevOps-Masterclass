name: Hello Spring Boot App To Docker

on: push

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v5 # see 'Supported distributions and versions' below
              with:
                  distribution: "temurin"
                  java-version: "21"
            - name: Build and Test (Maven)
              working-directory: ./docker/app1-hello/springboot/hello-spring
              run: mvn -B clean verify
            - name: Upload Test Reports
              uses: actions/upload-artifact@v4
              with:
                  name: test-reports
                  path: docker/app1-hello/springboot/hello-spring/target/surefire-reports/
    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup JDK
              uses: actions/setup-java@v5
              with:
                  distribution: "temurin"
                  java-version: "21"
            - name: Build  JAR for Docker
              working-directory: ./docker/app1-hello/springboot/hello-spring
              run: mvn -B clean package -DskipTests

            - name: Login to DockerHub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v6
              with:
                  context: ./docker/app1-hello/springboot/hello-spring
                  push: true
                  tags: ${{ secrets.DOCKERHUB_USERNAME }}/hello-spring:latest
