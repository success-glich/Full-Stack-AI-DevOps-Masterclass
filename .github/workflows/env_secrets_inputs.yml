name: DEMO CI ENV SECRETES

on:
    push:
        branches: [ "main" ]
    workflow_dispatch:

        #Workflow level environment variables
env:
    APP_ENV_V1: demo_application
    DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Run a one-line script
              run: echo "Hello from the second workflow!"

            - name: Create a demo file
              run: echo "This is a demo file created by the workflow." > demo.txt

            - name: Upload demo file to artifact
              uses: actions/upload-artifact@v4
              with:
                  name: demo-file
                  path: demo.txt
            - name: Print Environment Variable
              env:
                  APP_ENV: demo_application
                  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
              run: echo "The application environment is $APP_ENV and the database password is
                  $DB_PASSWORD and Work flow LEVEL DB_PASSWORD is $APP_ENV_V1"

    test:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Run a one-line script
              run: echo "Hello from the second workflow!"
